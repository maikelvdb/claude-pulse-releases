appId: com.claudepulse.app
productName: Claude Pulse
icon: build/icon
directories:
  output: release
npmRebuild: false
files:
  - dist/**/*
  - build/icon.ico
  - build/icon.png
  - package.json
  - node_modules/@homebridge/node-pty-prebuilt-multiarch/**/*
win:
  target: nsis
  icon: build/icon.ico
mac:
  target: dmg
  icon: build/icon.png
linux:
  target: AppImage
  icon: build/icon.png
