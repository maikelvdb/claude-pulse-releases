appId: com.claudepulse.app
productName: Claude Pulse
icon: build/icon
directories:
  output: release
npmRebuild: false
compression: maximum
files:
  - dist/**/*
  - build/icon.ico
  - build/icon.png
  - package.json
  - node_modules/@homebridge/node-pty-prebuilt-multiarch/**/*
  - "!node_modules/@homebridge/node-pty-prebuilt-multiarch/prebuilds/linux-*"
  - "!node_modules/@homebridge/node-pty-prebuilt-multiarch/prebuilds/linux-*/**/*"
  - "!node_modules/@homebridge/node-pty-prebuilt-multiarch/third_party/conpty/**/win10-arm64"
  - "!node_modules/@homebridge/node-pty-prebuilt-multiarch/third_party/conpty/**/win10-arm64/**/*"
  - "!node_modules/@homebridge/node-pty-prebuilt-multiarch/src/**/*"
  - "!node_modules/@homebridge/node-pty-prebuilt-multiarch/*.md"
win:
  target: nsis
  icon: build/icon.ico
nsis:
  oneClick: true
  perMachine: false
mac:
  target: dmg
  icon: build/icon.png
linux:
  target: AppImage
  icon: build/icon.png
